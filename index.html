<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeShare - P2P Media Transfer</title>

<!-- Firebase for signaling -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: #fff;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.app {
  width: 400px;
  height: 700px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(25px);
  border-radius: 25px;
  padding: 25px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.2);
}

.header {
  font-size: 24px;
  text-align: center;
  font-weight: 700;
  margin-bottom: 20px;
  background: linear-gradient(45deg, #00f2ff, #ff00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.room-id {
  background: rgba(255,255,255,0.2);
  padding: 12px;
  border-radius: 15px;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 20px;
  word-break: break-all;
}

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #00f2ff;
  color: #000;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
}

.upload-area {
  border: 3px dashed rgba(255,255,255,0.5);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  cursor: pointer;
  margin-bottom: 20px;
  transition: all 0.3s ease;
  position: relative;
}

.upload-area:hover {
  border-color: #00f2ff;
  background: rgba(0,242,255,0.1);
}

.upload-area.dragover {
  border-color: #00f2ff;
  background: rgba(0,242,255,0.2);
}

.upload-text {
  font-size: 16px;
  margin-bottom: 10px;
}

.file-info {
  font-size: 14px;
  color: #ccc;
  margin-top: 10px;
}

.status {
  text-align: center;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 20px;
  font-weight: 500;
}

.status.connected { background: rgba(0,255,127,0.3); }
.status.waiting { background: rgba(255,193,7,0.3); }
.status.transferring { background: rgba(0,242,255,0.3); }

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(45deg, #00f2ff, #00d4ff);
  color: #000;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  margin-bottom: 15px;
  transition: transform 0.2s;
}

.btn:hover { transform: translateY(-2px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.feed {
  flex: 1;
  overflow-y: auto;
  padding-right: 5px;
}

.card {
  background: rgba(255,255,255,0.15);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  backdrop-filter: blur(10px);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.card-time {
  font-size: 12px;
  color: #aaa;
}

.card-media img, .card-media video {
  width: 100%;
  border-radius: 12px;
  max-height: 200px;
  object-fit: cover;
}

.card-media audio {
  width: 100%;
  margin-top: 10px;
}

.pdf-link {
  display: inline-block;
  padding: 12px 20px;
  background: linear-gradient(45deg, #ff4757, #ff3838);
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: 600;
  margin-top: 10px;
}

::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}

::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.3);
  border-radius: 10px;
}
</style>
</head>

<body>
<div class="app">
  <div class="header">✨ VibeShare P2P</div>
  
  <div class="room-id">
    Room: <span id="roomId">generating...</span>
    <button class="copy-btn" onclick="copyRoomId()">📋 Copy</button>
  </div>

  <div class="status waiting" id="status">Waiting for connection...</div>

  <div class="upload-area" id="uploadArea" onclick="fileInput.click()">
    <div>📱 Click or Drag & Drop</div>
    <div class="upload-text">Images, Videos, Audio, PDF (Max 10MB)</div>
    <div class="file-info" id="fileInfo"></div>
    <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf" hidden>
  </div>

  <button class="btn" id="sendBtn" onclick="sendFile()" disabled>Send File</button>

  <div class="feed" id="feed"></div>
</div>

<script>
// Firebase Config (replace with your own)
const firebaseConfig = {
  databaseURL: "https://vibetransfer-adbdf-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Generate Room ID
const roomId = 'room_' + Math.random().toString(36).substr(2, 9);
document.getElementById('roomId').textContent = roomId;

// WebRTC Setup
let peerConnection = null;
let dataChannel = null;
let selectedFile = null;
const feed = document.getElementById('feed');
const status = document.getElementById('status');
const sendBtn = document.getElementById('sendBtn');

// Copy Room ID
function copyRoomId() {
  navigator.clipboard.writeText(roomId).then(() => {
    const btn = document.querySelector('.copy-btn');
    const original = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = original, 2000);
  });
}

// File Input
const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');

fileInput.addEventListener('change', (e) => {
  selectedFile = e.target.files[0];
  if (selectedFile) {
    document.getElementById('fileInfo').textContent = `${selectedFile.name} (${(selectedFile.size/1024/1024).toFixed(1)}MB)`;
    sendBtn.disabled = false;
  }
});

// Drag & Drop
uploadArea.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => {
  uploadArea.classList.remove('dragover');
});
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && (file.type.startsWith('image/') || file.type.startsWith('video/') || 
      file.type.startsWith('audio/') || file.type === 'application/pdf')) {
    fileInput.files = e.dataTransfer.files;
    fileInput.dispatchEvent(new Event('change'));
  }
});

// Initialize WebRTC
function initWebRTC() {
  peerConnection = new RTCPeerConnection({
    iceServers: [{urls: 'stun:stun.l.google.com:19302'}]
  });

  // Data channel
  dataChannel = peerConnection.createDataChannel('media');
  dataChannel.onopen = () => {
    status.textContent = '✅ Connected! Ready to send files';
    status.className = 'status connected';
  };
  dataChannel.onmessage = (event) => {
    receiveFile(event.data);
  };

  // ICE candidates
  peerConnection.onicecandidate = (event) => {
    if (event.candidate) {
      db.ref(`rooms/${roomId}/candidates`).push(event.candidate);
    }
  };

  // Track remote stream
  peerConnection.ontrack = (event) => {
    console.log('Remote stream received');
  };
}

// Send File via WebRTC
async function sendFile() {
  if (!selectedFile || !dataChannel || dataChannel.readyState !== 'open') {
    alert('No connection or file selected');
    return;
  }

  if (selectedFile.size > 10 * 1024 * 1024) {
    alert('File too large (max 10MB)');
    return;
  }

  status.textContent = '📤 Sending...';
  status.className = 'status transferring';

  const reader = new FileReader();
  reader.onload = (e) => {
    const fileData = {
      name: selectedFile.name,
      type: selectedFile.type,
      size: selectedFile.size,
      data: e.target.result,
      time: Date.now()
    };
    
    dataChannel.send(JSON.stringify(fileData));
    
    // Add to own feed
    addToFeed(fileData, true);
    
    // Reset
    selectedFile = null;
    fileInput.value = '';
    document.getElementById('fileInfo').textContent = '';
    sendBtn.disabled = true;
    
    status.textContent = '✅ File sent!';
    setTimeout(() => {
      status.textContent = '✅ Connected! Ready to send files';
    }, 2000);
  };
  reader.readAsArrayBuffer(selectedFile);
}

// Receive File
function receiveFile(dataStr) {
  const fileData = JSON.parse(dataStr);
  addToFeed(fileData, false);
  
  status.textContent = `📥 Received: ${fileData.name}`;
  status.className = 'status transferring';
  setTimeout(() => {
    status.textContent = '✅ Connected! Ready to send files';
  }, 2000);
}

// Add to Feed
function addToFeed(fileData, isSent) {
  const card = document.createElement('div');
  card.className = 'card';
  
  const time = new Date(fileData.time).toLocaleTimeString();
  const direction = isSent ? '📤 Sent' : '📥 Received';
  
  let mediaHTML = '';
  if (fileData.type.startsWith('image/')) {
    mediaHTML = `<div class="card-media"><img src="${fileData.data}" alt="${fileData.name}"></div>`;
  } else if (fileData.type.startsWith('video/')) {
    mediaHTML = `<div class="card-media"><video controls src="${fileData.data}"></video></div>`;
  } else if (fileData.type.startsWith('audio/')) {
    mediaHTML = `<div class="card-media"><audio controls src="${fileData.data}"></audio></div>`;
  } else if (fileData.type === 'application/pdf') {
    mediaHTML = `<a href="${fileData.data}" class="pdf-link" target="_blank">📄 Open PDF</a>`;
  }

  card.innerHTML = `
    <div class="card-header">
      <span>${direction}</span>
      <span class="card-time">${time}</span>
    </div>
    ${mediaHTML}
    <div style="font-size:12px;color:#aaa;margin-top:8px">${fileData.name}</div>
  `;
  
  feed.insertBefore(card, feed.firstChild);
}

// Room signaling
db.ref(`rooms/${roomId}`).on('value', (snap) => {
  const room = snap.val();
  if (room && room.offer && !peerConnection.remoteDescription) {
    peerConnection.setRemoteDescription(new RTCSessionDescription(room.offer));
    peerConnection.createAnswer().then(answer => {
      peerConnection.setLocalDescription(answer);
      db.ref(`rooms/${roomId}`).update({answer});
    });
  } else if (room && room.answer) {
    peerConnection.setRemoteDescription(new RTCSessionDescription(room.answer));
  }
});

// Listen for candidates
db.ref(`rooms/${roomId}/candidates`).on('child_added', (snap) => {
  const candidate = snap.val();
  if (candidate) {
    peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
  }
});

// Create offer when page loads
initWebRTC();
peerConnection.createOffer().then(offer => {
  peerConnection.setLocalDescription(offer);
  db.ref(`rooms/${roomId}`).update({offer});
});
</script>
</body>
</html>
