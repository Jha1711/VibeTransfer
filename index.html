<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VibeShare Direct</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
}

.app{
  text-align:center;
}

button{
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00f2ff;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="app">
  <h2>⚡ VibeShare Direct</h2>
  <input type="file" id="fileInput">
  <br>
  <button onclick="startSend()">Send</button>
  <button onclick="startReceive()">Receive</button>
  <p id="status">Idle</p>
</div>

<script>
let pc = new RTCPeerConnection();
let channel;

function startSend(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Select file");

  channel = pc.createDataChannel("file");

  channel.onopen = ()=>{
    document.getElementById("status").innerText = "Sending...";
    channel.send(file);
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      console.log("Send this to receiver:", JSON.stringify(e.candidate));
    }
  };

  pc.createOffer().then(o=>{
    pc.setLocalDescription(o);
    console.log("Offer:", JSON.stringify(o));
  });
}

function startReceive(){
  pc.ondatachannel = e=>{
    channel = e.channel;

    channel.onmessage = msg=>{
      const blob = msg.data;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "received_file";
      a.click();
    };
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      console.log("Send this to sender:", JSON.stringify(e.candidate));
    }
  };
}
</script>

</body>
</html>
