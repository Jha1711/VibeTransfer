<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeShare Nearby</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app{
  width:350px;
  text-align:center;
}

h1{
  margin-bottom:20px;
}

button{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.send{background:#00f2ff;color:#000;}
.receive{background:#00ff88;color:#000;}

#fileInput{display:none;}

.status{
  margin-top:15px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="app">

<h1>⚡ VibeShare</h1>

<button class="send" onclick="startSend()">📤 Send</button>
<input type="file" id="fileInput">

<button class="receive" onclick="startReceive()">📥 Receive</button>

<div class="status" id="status">Ready</div>

</div>

<script>
// Firebase config
const firebaseConfig = {
  databaseURL: "https://vibetransfer-adbdf-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let pc;
let channel;
let roomId = "room1"; // auto room (no code UI)

// SEND
function startSend(){
  document.getElementById("fileInput").click();

  document.getElementById("fileInput").onchange = async (e)=>{
    const file = e.target.files[0];

    pc = new RTCPeerConnection();
    channel = pc.createDataChannel("file");

    channel.onopen = ()=>{
      document.getElementById("status").innerText = "Sending...";
      channel.send(file);
    };

    pc.onicecandidate = e=>{
      if(e.candidate){
        db.ref("rooms/"+roomId+"/sender").set(JSON.stringify(e.candidate));
      }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    db.ref("rooms/"+roomId+"/offer").set(JSON.stringify(offer));

    db.ref("rooms/"+roomId+"/answer").on("value", async snap=>{
      if(snap.exists()){
        const ans = JSON.parse(snap.val());
        await pc.setRemoteDescription(ans);
      }
    });
  }
}

// RECEIVE
function startReceive(){
  pc = new RTCPeerConnection();

  pc.ondatachannel = e=>{
    channel = e.channel;

    channel.onmessage = msg=>{
      const blob = msg.data;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "received_file";
      a.click();

      document.getElementById("status").innerText = "File received!";
    };
  };

  pc.onicecandidate = e=>{
    if(e.candidate){
      db.ref("rooms/"+roomId+"/receiver").set(JSON.stringify(e.candidate));
    }
  };

  db.ref("rooms/"+roomId+"/offer").on("value", async snap=>{
    if(snap.exists()){
      const offer = JSON.parse(snap.val());
      await pc.setRemoteDescription(offer);

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      db.ref("rooms/"+roomId+"/answer").set(JSON.stringify(answer));
    }
  });
}
</script>

</body>
</html>
